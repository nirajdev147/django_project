services:
  - type: web
    name: my-site
    env: python
    branch: main
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn my_site.wsgi:application --bind 0.0.0.0:$PORT

databases:
  - name: my-site-db
    engine: postgres
    plan: starter
